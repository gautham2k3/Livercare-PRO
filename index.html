<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LiverCare Pro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/app.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>

    <div class="container py-4">

        <!-- Header -->
        <header class="d-flex justify-content-between align-items-center mb-4">

            <div class="logo d-flex align-items-center gap-3">

                <div class="logo-icon">
                    🌿
                </div>

                <div>
                    <h2 class="mb-0 fw-bold">
                        LiverCare Pro
                    </h2>

                    <p class="mb-0 text-secondary">
                        Recover smarter.
                    </p>
                </div>

            </div>

            <button
                id="themeBtn"
                class="btn btn-light rounded-circle shadow-sm">

                <i class="bi bi-moon-stars-fill"></i>

            </button>

        </header>

        <!-- Dynamic Content -->
        <main id="app">

            <!-- HOME PAGE -->

            <section id="home-page">

                <div class="hero-card">

                    <div>

                        <p class="small text-uppercase mb-2">
                            Recovery Score
                        </p>

                        <h1 id="score">
                            82%
                        </h1>

                    </div>

                    <div class="progress-ring">
                        82%
                    </div>

                </div>

                <div class="row g-3 mt-2">

                    <div class="col-6">

                        <div class="info-card">

                            <i class="bi bi-cup-straw"></i>

                            <h5>Water</h5>

                            <p>6 / 8 Glasses</p>

                        </div>

                    </div>

                    <div class="col-6">

                        <div class="info-card">

                            <i class="bi bi-egg-fried"></i>

                            <h5>Meals</h5>

                            <p>4 / 5 Meals</p>

                        </div>

                    </div>

                    <div class="col-6">

                        <div class="info-card">

                            <i class="bi bi-capsule"></i>

                            <h5>Medicine</h5>

                            <p>Completed</p>

                        </div>

                    </div>

                    <div class="col-6">

                        <div class="info-card">

                            <i class="bi bi-moon-stars"></i>

                            <h5>Sleep</h5>

                            <p>8 Hours</p>

                        </div>

                    </div>

                </div>

                <h4 class="mt-5 mb-3">
                    Quick Actions
                </h4>

                <div class="row g-3">

                    <div class="col-6">

                        <button class="action-btn" data-page="food">

                            <i class="bi bi-search"></i>

                            Food Search

                        </button>

                    </div>

                    <div class="col-6">

                        <button class="action-btn" data-page="tracker">

                            <i class="bi bi-graph-up-arrow"></i>

                            Recovery Tracker

                        </button>

                    </div>

                    <div class="col-6">

                        <button class="action-btn" data-page="recipes">

                            <i class="bi bi-book-half"></i>

                            Recipes

                        </button>

                    </div>

                    <div class="col-6">

                        <button class="action-btn" data-page="planner">

                            <i class="bi bi-calendar-week"></i>

                            Meal Planner

                        </button>

                    </div>

                </div>

            </section>

        </main>

    </div>

    <!-- Bottom Navigation -->

    <nav class="bottom-nav">

        <button
            class="active"
            data-page="home">

            <i class="bi bi-house-fill"></i>

            <span>Home</span>

        </button>

        <button data-page="food">

            <i class="bi bi-apple"></i>

            <span>Food</span>

        </button>

        <button data-page="tracker">

            <i class="bi bi-activity"></i>

            <span>Tracker</span>

        </button>

        <button data-page="planner">

            <i class="bi bi-calendar2-week"></i>

            <span>Planner</span>

        </button>

        <button data-page="settings">

            <i class="bi bi-gear-fill"></i>

            <span>Settings</span>

        </button>

    </nav>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/app.js"></script>
    <script src="js/meals.js"></script>
    <script src="js/medicine.js"></script>
    <script src="js/water.js"></script>
    <script src="js/tracker.js"></script>
    <script src="js/router.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/food-search.js"></script>
    <script src="js/charts.js"></script>

</body>

</html>
